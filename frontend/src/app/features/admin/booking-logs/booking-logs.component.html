<div class="logs-page">
  <header class="page-header">
    <div>
      <h1>Логи бронирования</h1>
      <p>История действий по автомобилям</p>
    </div>
    <a routerLink="/admin" class="secondary-link">К админке</a>
  </header>

  <div class="loading" *ngIf="loading()">Загрузка...</div>

  <div class="table-wrap" *ngIf="!loading()">
    <table>
      <thead>
        <tr>
          <th>Время</th>
          <th>Авто</th>
          <th>Действие</th>
          <th>Пользователь</th>
          <th>Детали</th>
        </tr>
      </thead>
      <tbody>
        <tr *ngFor="let log of logs()">
          <td>{{ log.created_at | date:'dd.MM.yyyy HH:mm' }}</td>
          <td>{{ log.car_brand }} {{ log.car_model }}<br /><strong>{{ log.registration_number }}</strong></td>
          <td>{{ log.action }}</td>
          <td>{{ log.username || '-' }}</td>
          <td>{{ log.details }}</td>
        </tr>
      </tbody>
    </table>
  </div>

  <div class="pagination" *ngIf="meta().totalPages > 1">
    <button *ngFor="let page of [].constructor(meta().totalPages); let i = index" (click)="changePage(i + 1)" [class.active]="meta().page === i + 1">
      {{ i + 1 }}
    </button>
  </div>
</div>
